<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strongest Engine ❄️ Materialistic World</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
</head>
<body>
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="snow-container"></div>

    <div id="login-screen" class="glass-container">
        <h1 class="logo-title">STRONGEST ❄️</h1>
        <p class="slogan">Vạn vật thay đổi - Vật chất lên ngôi</p>
        <div class="neumorphic-card main-card">
            <input type="password" id="license-key" class="input-field" placeholder="NHẬP LICENSE KEY...">
            <button class="btn btn-primary" onclick="checkLogin()">KÍCH HOẠT HỆ THỐNG</button>
        </div>
    </div>

    <div id="main-panel" class="hidden">
        <div class="header">
            <h1 class="logo-title small">STRONGEST ENGINE</h1>
            <div class="status-group">
                <div class="badge neon-green">● SYSTEM READY</div>
                <div id="key-type-badge" class="badge">USER</div>
                <button id="music-toggle" class="btn-icon" onclick="toggleMusic()">🔊</button>
            </div>
        </div>

        <div class="nav-container">
            <div class="nav-tabs">
                <div class="tab active" onclick="switchTab(this, 'dashboard')">TRANG CHỦ</div>
                <div class="tab" onclick="switchTab(this, 'chucnang')">CHỨC NĂNG</div>
                <div id="dev-tab" class="tab hidden admin-tab" onclick="switchTab(this, 'developer')">ADMIN PANEL</div>
            </div>
        </div>

        <div id="content-area">
            <div id="tab-dashboard" class="tab-content">
                <div class="neumorphic-card detail-box">
                    <div class="section-header">
                        <span class="icon">📱</span>
                        <span class="title">MỤC TIÊU HỆ THỐNG</span>
                    </div>
                    <button class="btn btn-scan" onclick="requestNativeDeviceApps()">QUÉT THIẾT BỊ</button>
                    <div id="app-grid-container" class="app-grid">
                        <p class="hint">Vui lòng quét ứng dụng...</p>
                    </div>
                    <input type="hidden" id="selected-target-pkg" value="">
                </div>

                <div class="neumorphic-card info-box">
                    <div class="row"><span>DEVICE:</span> <span class="val" id="os-info">Android</span></div>
                    <div class="row"><span>TARGET:</span> <span class="val neon-blue" id="display-target">None</span></div>
                </div>
            </div>

            <div id="tab-chucnang" class="tab-content hidden">
                <div class="neumorphic-card">
                    <div class="section-header"><span class="title">INJECT CONTROL</span></div>
                    <div class="row">
                        <span>AIMLOCK NATIVE</span>
                        <label class="switch"><input type="checkbox" onchange="toggleHack('Aimlock', this)"><span class="slider"></span></label>
                    </div>
                    <div class="row">
                        <span>NO RECOIL REAL</span>
                        <label class="switch"><input type="checkbox" onchange="toggleHack('NoRecoil', this)"><span class="slider"></span></label>
                    </div>
                </div>
            </div>

            <div id="tab-developer" class="tab-content hidden">
                <div class="neumorphic-card admin-card">
                    <div class="section-header"><span class="title">KEYGEN SYSTEM</span></div>
                    <div class="admin-row">
                        <select id="key-time" class="input-field small">
                            <option value="1">1 NGÀY</option>
                            <option value="7">7 NGÀY</option>
                            <option value="30">30 NGÀY</option>
                            <option value="999">VĨNH VIỄN</option>
                        </select>
                        <button class="btn btn-action" onclick="generateKey()">TẠO KEY</button>
                    </div>
                    <input type="text" id="generated-key-box" class="input-field" readonly placeholder="Key sẽ hiện ở đây...">
                </div>

                <div class="neumorphic-card admin-card">
                    <div class="section-header"><span class="title">FILE MANAGER</span></div>
                    <div class="admin-row">
                        <input type="file" id="file-aim" hidden onchange="prepareFile('aim')">
                        <button class="btn btn-sub" onclick="document.getElementById('file-aim').click()">NẠP AIM</button>
                        <button id="ok-aim" class="btn-ok hidden" onclick="confirmFile('aim')">OK</button>
                    </div>
                    <div id="active-files" class="file-list"></div>
                </div>
            </div>
        </div>
        
        <button class="logout-link" onclick="logout()">THOÁT HỆ THỐNG</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
