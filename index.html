<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Support File Strongest ❄️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="center-app">
    <div id="login-screen" class="full-center">
        <div class="apple-container">
            <svg class="main-logo" viewBox="0 0 170 170">
                <path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.18-14.35-3.18-4.58 0-9.43 1.06-14.57 3.18-5.14 2.12-9.43 3.23-12.86 3.34-5.24.23-10.14-1.92-14.7-6.46-3.04-2.73-6.83-7.39-11.38-13.97-4.55-6.58-8.14-13.84-10.76-21.78-2.62-7.95-3.93-16.02-3.93-24.22 0-11.54 2.31-21.24 6.94-29.08 3.32-5.59 7.79-10 13.41-13.24 5.61-3.23 11.83-4.87 18.66-4.87 3.84 0 8.44.91 13.81 2.73 5.37 1.82 8.92 2.73 10.65 2.73 1.52 0 5.48-1.07 11.88-3.23 6.4-2.15 11.66-3.11 15.79-2.87 11.69.7 20.91 5.09 27.65 13.17-10.51 6.36-15.72 15.4-15.65 27.13.07 9.4 3.32 17.26 9.76 23.57 3.2 3.12 6.84 5.51 10.92 7.15zM114.92 11.39c0 8.52-3.08 16.14-9.23 22.86-6.66 7.19-14.39 11.23-23.21 12.13.07-8.08 3.25-15.93 9.53-23.55 6.23-7.55 14.15-11.9 23.75-13.04.14.54.16 1.07.16 1.6z" fill="url(#metalGrad)"/>
                <defs><linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ffffff"/><stop offset="50%" style="stop-color:#8e8e93"/><stop offset="100%" style="stop-color:#c0c0c0"/></linearGradient></defs>
            </svg>
            <h1 class="brand-title">Support File Strongest ❄️</h1>
            <p class="slogan">UY TÍN - CHẤT LƯỢNG - GIÁ RẺ SỐ 1 VN</p>
        </div>
        
        <div class="metal-card border-gold login-box">
            <input type="text" id="license-key" class="metal-input text-center" placeholder="NHẬP KEY TẠI ĐÂY...">
            <button class="btn-metal gold-bg" onclick="checkLogin()">KÍCH HOẠT NGAY</button>
        </div>
    </div>

    <div id="main-panel" class="hidden full-width">
        <div class="nav-tabs-center">
            <div class="nav-tabs">
                <div class="tab active" onclick="switchTab(this, 'dashboard')">DASHBOARD</div>
                <div class="tab" onclick="switchTab(this, 'chucnang')">CHỨC NĂNG</div>
                <div id="dev-tab" class="tab hidden" onclick="switchTab(this, 'admin')">ADMIN</div>
            </div>
        </div>

        <div id="content-area" class="full-center-content">
            <div id="tab-dashboard" class="tab-content active-content">
                <div class="metal-card border-gold">
                    <h3 class="section-title">HỆ THỐNG THIẾT BỊ</h3>
                    <select id="select-os" class="metal-input" onchange="updateDeviceList()">
                        <option value="android">🤖 ANDROID</option>
                        <option value="ios">🍎 iOS</option>
                        <option value="windows">💻 WINDOWS</option>
                        <option value="macos">🍏 macOS</option>
                    </select>
                    <select id="select-device" class="metal-input"></select>
                    
                    <h3 class="section-title" style="margin-top: 20px;">QUÉT ỨNG DỤNG</h3>
                    <div class="app-scan-row">
                        <select id="select-app" class="metal-input" onchange="changeAppLogo()">
                            <option value="ff">Free Fire</option>
                            <option value="ffmax">Free Fire MAX</option>
                        </select>
                        <div class="logo-box-main">
                            <img id="app-logo-display" src="" alt="icon">
                        </div>
                    </div>
                    <button class="btn-action gold-bg" onclick="scanDevices()">QUÉT TOÀN BỘ HỆ THỐNG</button>
                </div>
                <button class="btn-logout-apple" onclick="logoutKey()">ĐĂNG XUẤT KEY</button>
            </div>

            <div id="tab-chucnang" class="tab-content hidden">
                <div class="metal-card border-purple">
                    <h3 class="section-title">MOD VIP CONTROL</h3>
                    <div class="mod-row">
                        <span>AIMLOCK 100%</span>
                        <label class="switch-ios"><input type="checkbox" onchange="toggleMod('Aimlock', this)"><span class="slider-ios"></span></label>
                    </div>
                    <div class="mod-row">
                        <span>NO RECOIL 100%</span>
                        <label class="switch-ios"><input type="checkbox" onchange="toggleMod('No Recoil', this)"><span class="slider-ios"></span></label>
                    </div>
                </div>
            </div>

            <div id="tab-admin" class="tab-content hidden">
                <div class="metal-card border-gold">
                    <h3 class="section-title">QUẢN LÝ FILE HỆ THỐNG</h3>
                    <input type="file" id="admin-file-upload" class="metal-input">
                    <select id="target-mod-folder" class="metal-input">
                        <option value="aimlock">Vào Mục: AIMLOCK</option>
                        <option value="norecoil">Vào Mục: NO RECOIL</option>
                    </select>
                    <button class="btn-metal gold-bg" onclick="uploadToMod()">THÊM TỆP VÀO MỤC</button>
                </div>
                <div class="metal-card border-gold" style="margin-top:15px">
                    <h3 class="section-title">TẠO MÃ KEY</h3>
                    <input type="text" id="new-key-name" class="metal-input" placeholder="Tên Key...">
                    <button class="btn-metal gold-bg" onclick="adminCreateKey()">XÁC NHẬN TẠO</button>
                    <div id="list-keys-admin" class="admin-key-view"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
