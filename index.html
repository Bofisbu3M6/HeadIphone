<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Support File Strongest ❄️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="center-all">
    <div id="login-screen" class="screen active">
        <div class="header-logo">
            <div class="apple-icon">🍎</div>
            <h1>Support File Strongest ❄️</h1>
            <p class="slogan">CHẤT LƯỢNG GIÁ RẺ SỐ 1 VN</p>
        </div>
        <div class="card">
            <input type="text" id="key-input" class="input-field" placeholder="NHẬP KEY APP TẠI ĐÂY...">
            <button class="btn-yellow" onclick="handleLogin()">KÍCH HOẠT KEY APP</button>
            <a href="https://zalo.me/0933653553" class="zalo-btn">LIÊN HỆ ADMIN MUA KEY (ZALO: 0933653553)</a>
        </div>
    </div>

    <div id="main-app" class="screen">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab(this, 'dashboard')">DASHBOARD</button>
            <button class="tab-btn" onclick="switchTab(this, 'chucnang')">CHỨC NĂNG</button>
            <button id="admin-tab" class="tab-btn hidden" onclick="switchTab(this, 'admin')">ADMIN</button>
        </div>

        <div class="container">
            <div id="tab-dashboard" class="content-tab active">
                <div class="card border-yellow">
                    <h2 class="title-yellow">HỆ THỐNG THIẾT BỊ</h2>
                    <select id="os-select" class="input-field" onchange="loadDevices()"></select>
                    <select id="device-select" class="input-field"></select>

                    <h2 class="title-yellow">QUÉT ỨNG DỤNG</h2>
                    <div class="app-row">
                        <select id="app-select" class="input-field" onchange="changeAppLogo()">
                            <option value="ff">Free Fire</option>
                            <option value="ffm">Free Fire MAX</option>
                        </select>
                        <div class="logo-box">
                            <img id="display-logo" src="" alt="logo">
                        </div>
                    </div>
                    <button class="btn-yellow-main" onclick="alert('Đang quét...')">QUÉT THIẾT BỊ & ỨNG DỤNG</button>
                </div>
                <button class="btn-logout" onclick="logout()">ĐĂNG XUẤT KEY KHỎI THIẾT BỊ</button>
            </div>

            <div id="tab-chucnang" class="content-tab">
                <div class="card border-yellow">
                    <h2 class="title-yellow">MOD CHỨC NĂNG</h2>
                    <div class="switch-row">
                        <span>AIMLOCK 100%</span>
                        <label class="switch"><input type="checkbox" onchange="showGameChoice('Aimlock')"><span class="slider"></span></label>
                    </div>
                    <div class="switch-row">
                        <span>NO RECOIL 100%</span>
                        <label class="switch"><input type="checkbox" onchange="showGameChoice('No Recoil')"><span class="slider"></span></label>
                    </div>
                </div>
            </div>

            <div id="tab-admin" class="content-tab">
                <div class="card border-yellow">
                    <h2 class="title-yellow">QUẢN LÝ TỆP</h2>
                    <input type="file" class="input-field">
                    <select id="folder-target" class="input-field">
                        <option value="aimlock">Mục: AIMLOCK</option>
                        <option value="norecoil">Mục: NO RECOIL</option>
                    </select>
                    <button class="btn-yellow" onclick="alert('Đã thêm tệp!')">THÊM TỆP VÀO MỤC</button>
                    
                    <hr style="border:0.5px solid #333; margin:20px 0;">
                    
                    <h2 class="title-yellow">TẠO & QUẢN LÝ KEY</h2>
                    <input type="text" id="admin-key-name" class="input-field" placeholder="Tên Key...">
                    <select id="admin-hsd" class="input-field">
                        <option value="1">1 Ngày</option>
                        <option value="7">7 Ngày</option>
                        <option value="30">30 Ngày</option>
                        <option value="9999">Vĩnh Viễn</option>
                    </select>
                    <button class="btn-yellow" onclick="adminAddKey()">TẠO KEY</button>
                    <div id="admin-key-list" class="key-list-area"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-box border-yellow">
            <h3 id="mod-title">BẬT MOD</h3>
            <p>Chọn phiên bản Free Fire:</p>
            <button class="game-btn ff" onclick="closeGameModal()">MỞ FREE FIRE</button>
            <button class="game-btn ffm" onclick="closeGameModal()">MỞ FREE FIRE MAX</button>
            <button class="close-btn" onclick="closeGameModal()">ĐÓNG</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
