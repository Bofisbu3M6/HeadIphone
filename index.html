<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Support File Strongest ❄️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="snow-container"></div>
    <audio id="bg-music" loop><source src="https://files.catbox.moe/o9v0d0.mp3" type="audio/mpeg"></audio>

    <div id="login-screen">
        <div class="apple-logo-container">
            <svg class="main-logo" viewBox="0 0 170 170">
                <path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.18-14.35-3.18-4.58 0-9.43 1.06-14.57 3.18-5.14 2.12-9.43 3.23-12.86 3.34-5.24.23-10.14-1.92-14.7-6.46-3.04-2.73-6.83-7.39-11.38-13.97-4.55-6.58-8.14-13.84-10.76-21.78-2.62-7.95-3.93-16.02-3.93-24.22 0-11.54 2.31-21.24 6.94-29.08 3.32-5.59 7.79-10 13.41-13.24 5.61-3.23 11.83-4.87 18.66-4.87 3.84 0 8.44.91 13.81 2.73 5.37 1.82 8.92 2.73 10.65 2.73 1.52 0 5.48-1.07 11.88-3.23 6.4-2.15 11.66-3.11 15.79-2.87 11.69.7 20.91 5.09 27.65 13.17-10.51 6.36-15.72 15.4-15.65 27.13.07 9.4 3.32 17.26 9.76 23.57 3.2 3.12 6.84 5.51 10.92 7.15zM114.92 11.39c0 8.52-3.08 16.14-9.23 22.86-6.66 7.19-14.39 11.23-23.21 12.13.07-8.08 3.25-15.93 9.53-23.55 6.23-7.55 14.15-11.9 23.75-13.04.14.54.16 1.07.16 1.6z" fill="url(#goldGrad)"/>
                <defs><linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#B8860B"/></linearGradient></defs>
            </svg>
        </div>
        <h1 class="brand-title">Support File Strongest ❄️</h1>
        <p class="slogan">UY TÍN ĐẶT LÊN HÀNG ĐẦU - CHẤT LƯỢNG GIÁ RẺ SỐ 1 VN</p>
        <div class="metal-card border-gold">
            <input type="text" id="license-key" class="metal-input" placeholder="NHẬP KEY APP TẠI ĐÂY...">
            <button class="btn-metal primary gold-bg" onclick="checkLogin()">KÍCH HOẠT KEY APP</button>
        </div>
    </div>

    <div id="key-popup" class="glass-overlay hidden">
        <div class="alert-box metal-card border-gold">
            <div class="alert-header">THÔNG TIN BẢN QUYỀN</div>
            <div class="alert-body">
                <p style="font-size: 10px; color: #8e8e93; margin-bottom: 10px;">Thời gian sử dụng còn lại:</p>
                <h2 id="popup-time" style="color: #ffd700; font-size: 1.1rem; text-shadow: 0 0 10px rgba(255,215,0,0.5);">-- : -- : --</h2>
            </div>
            <div class="alert-footer">
                <button class="btn-alert-close" onclick="closePopup()">ĐÓNG</button>
                <button class="btn-alert-hide" onclick="hideFor2Hours()">ẨN TRONG 2 TIẾNG</button>
            </div>
        </div>
    </div>

    <div id="main-panel" class="hidden">
        <div class="glass-header">
            <span class="header-title">SUPPORT FILE STRONGEST ❄️</span>
            <button id="music-toggle" onclick="toggleMusic()">🔊</button>
        </div>

        <div class="nav-tabs">
            <div class="tab active" onclick="switchTab(this, 'dashboard')">DASHBOARD</div>
            <div class="tab" onclick="switchTab(this, 'chucnang')">CHỨC NĂNG</div>
            <div id="dev-tab" class="tab hidden" onclick="switchTab(this, 'developer')">ADMIN</div>
        </div>

        <div id="content-area">
            <div id="tab-dashboard" class="tab-content">
                <div class="category-section">
                    <h3 class="section-title">HỆ ĐIỀU HÀNH</h3>
                    <select id="select-os" class="metal-input" onchange="updateDeviceList()">
                        <option value="adr">ANDROID</option>
                        <option value="ios">IOS (IPHONE/IPAD)</option>
                        <option value="pc">PC (WINDOWS)</option>
                        <option value="laptop">LAPTOP (WINDOWS/MAC)</option>
                    </select>

                    <h3 class="section-title">HÃNG THIẾT BỊ</h3>
                    <select id="select-device" class="metal-input" onchange="updateVersionList()"></select>

                    <h3 class="section-title">PHIÊN BẢN HỆ THỐNG</h3>
                    <select id="select-version" class="metal-input"></select>
                </div>

                <div class="metal-card border-gold">
                    <button class="btn-action gold-bg" onclick="requestNativeDeviceApps()">QUÉT ỨNG DỤNG TRÊN THIẾT BỊ</button>
                    <div id="app-grid-container" class="app-grid"></div>
                </div>
            </div>

            <div id="tab-chucnang" class="tab-content hidden">
                <div class="metal-card border-purple">
                    <h3 class="section-title" style="color:#af52de; border-color:#af52de;">KÍCH HOẠT MOD VIP</h3>
                    <div class="control-row">
                        <span class="main-lbl">AIMLOCK VIP PRO</span>
                        <label class="ios-switch"><input type="checkbox" onchange="processFileReplace('aimlock', this)"><span class="ios-slider"></span></label>
                    </div>
                    <div class="control-row">
                        <span class="main-lbl">NO RECOIL 100%</span>
                        <label class="ios-switch"><input type="checkbox" onchange="processFileReplace('norecoil', this)"><span class="ios-slider"></span></label>
                    </div>
                </div>
                <div id="overwrite-log" class="terminal-log hidden"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
