<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="web-title">Aimlock Strongest iPhone❄️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen">
        <h1 class="title">Aimlock Strongest iPhone❄️</h1>
        <div class="neumorphic-card">
            <input type="password" id="license-key" class="input-field" placeholder="NHẬP LICENSE KEY...">
            <button class="btn" onclick="checkLogin()">KÍCH HOẠT HỆ THỐNG</button>
        </div>
    </div>

    <div id="main-panel" class="hidden">
        <div class="header">
            <h1 id="app-title">Aimlock Strongest iPhone❄️</h1>
            <div id="user-tag">PHIÊN BẢN v1.0</div>
        </div>

        <div class="status-row">
            <div class="badge green">● SERVER ONLINE</div>
            <div id="key-type" class="badge">MEMBER</div>
            <div class="badge">15ms</div>
        </div>

        <div class="tabs">
            <div class="tab active">DASHBOARD</div>
            <div class="tab">CHỨC NĂNG</div>
            <div id="admin-only-tab" class="tab hidden" style="color: #ff4757;">ADMIN MENU</div>
        </div>

        <div id="admin-settings" class="neumorphic-card hidden" style="border: 1px solid #4a8df8;">
            <div class="row">
                <span style="color: #4a8df8;">KÍCH HOẠT STRONGET</span>
                <label class="switch">
                    <input type="checkbox" id="master-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="neumorphic-card">
            <div class="row"><span>Kills Today</span> <span class="val">4,291</span></div>
            <div class="row"><span>Win Rate</span> <span class="val">98.7%</span></div>
            <div class="row"><span>K/D Ratio</span> <span class="val">24.1</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
